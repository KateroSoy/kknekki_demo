<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestsellers | KKNEKKI®</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="header-root"></div>

  <div class="page-header">
    <h1>Bestsellers</h1>
  </div>

  <main class="section" style="padding-top: 40px;">
    <div class="product-grid">
      <div class="product-card">
        <a href="product.html?id=1">
          <div class="product-image-wrapper">
            <img src="assets/product_blue.jpg" alt="Sea Blue Hair Tie" class="product-image">
            <button class="quick-add-btn" onclick="event.preventDefault(); addToCart('SEA BLUE', 4.00, 'assets/product_blue.jpg')">Add to Cart</button>
          </div>
          <div class="product-info">
            <h3 class="product-title">SEA BLUE</h3>
            <p class="product-price">€4.00</p>
          </div>
        </a>
      </div>
      <div class="product-card">
        <a href="product.html?id=3">
          <div class="product-image-wrapper">
            <img src="assets/product_yellow.jpg" alt="Neon Yellow" class="product-image">
            <button class="quick-add-btn" onclick="event.preventDefault(); addToCart('NEON YELLOW', 4.00, 'assets/product_yellow.jpg')">Add to Cart</button>
          </div>
          <div class="product-info">
            <h3 class="product-title">NEON YELLOW</h3>
            <p class="product-price">€4.00</p>
          </div>
        </a>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>
  <script type="module" src="/components.js"></script>
  <script type="module" src="/script.js"></script>
</body>
</html>
